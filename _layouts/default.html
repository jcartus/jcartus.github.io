<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header>
    <nav>
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <ul>
        <li>
          <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a>
        </li>
        <li class="dropdown">
          <a href="#" class="dropdown-toggle">Apps &#9660;</a>
          <ul class="dropdown-menu">
            <li><a href="{{ '/apps/ikuzo/' | relative_url }}">ikuzo!</a></li>
          </ul>
        </li>
        <li>
          <a href="{{ '/privacy-policy/' | relative_url }}"{% if page.url == '/privacy-policy/' %} class="active"{% endif %}>Privacy Policy</a>
        </li>
      </ul>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}</p>
  </footer>
</body>
</html>
